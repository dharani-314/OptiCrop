<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Your Crop - OptiCrop</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body style="background-image:url('{{ url_for('static', filename='images/crop.jpg') }}');">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">

        <a class="navbar-brand fw-bold" href="/">🌱 OptiCrop</a>

        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/">Home</a>
            <a class="nav-link" href="/about">About</a>
            <a class="nav-link active" href="/findyourcrop">Find Your Crop</a>
        </div>

    </div>
</nav>

<!-- Prediction Form -->

<div class="container-box">

    <h2>🌾 Crop Recommendation System</h2>

    <form action="{{ url_for('predict') }}" method="POST">

        <div class="mb-3">
            <label class="form-label">Nitrogen (N)</label>
            <input type="number" class="form-control" name="nitrogen" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Phosphorous (P)</label>
            <input type="number" class="form-control" name="phosphorous" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Potassium (K)</label>
            <input type="number" class="form-control" name="potassium" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Temperature (°C)</label>
            <input type="number" step="0.01" class="form-control" name="temperature" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Humidity (%)</label>
            <input type="number" step="0.01" class="form-control" name="humidity" required>
        </div>

        <div class="mb-3">
            <label class="form-label">pH Value</label>
            <input type="number" step="0.01" class="form-control" name="ph" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Rainfall (mm)</label>
            <input type="number" step="0.01" class="form-control" name="rainfall" required>
        </div>

        <button type="submit" class="btn btn-success w-100">
            🌱 Predict Best Crop
        </button>

    </form>

    {% if prediction_text %}
    <div class="alert alert-success mt-4 text-center">
        <h4>{{ prediction_text }}</h4>
    </div>
    {% endif %}

</div>

<!-- Footer -->
<footer class="text-center text-white mt-5 p-3" style="background:rgba(25,135,84,0.9);">
    © 2026 OptiCrop | Smart Agricultural Production Optimization Engine
</footer>

</body>
</html>
